<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7222 Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="clock-section">
                <div class="clock-container">
                    <canvas id="clockCanvas"></canvas>
                </div>
            </div>
            <div class="info-section">
                <div class="interval-description">
                    <p class="mirtha-intro">72/22 Clock introduces the Mirtha. Replacement of the Second</p>
                    <ul>
                        <li><span id="mirtha-tick" class="tick mirtha">00</span> <strong class="mirtha">Mirtha</strong> <span class="desc">1 Mirtha = 72/22 (~3.27273s) seconds</span></li>
                        <li><span id="minit-tick" class="tick minit">00</span> <strong class="minit">Minit</strong> <span class="desc">1 Minit = 22 Mirthas</span></li>
                        <li><span id="huor-tick" class="tick huor">00</span> <strong class="huor">Huor</strong> <span class="desc">1 Huor = 50 Minits</span></li>
                    </ul>
                </div>
                <div class="button-container">
                    <button id="toggleSound">🔊 Sound: On</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="clock.js"></script>
</body>
</html>
