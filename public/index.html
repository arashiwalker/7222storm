<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>72/22 Clock</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <div class="main-container">
    <div class="clock-container">
      <canvas id="clockCanvas"></canvas>
    </div>
    <div class="info-container">
      <h1>72/22 Clock</h1>
      <p class="mirtha">Mirtha: <span id="mirthaCount">0</span> (3.2727 seconds)</p>
      <p class="minit">Minit: <span id="minitCount">0</span> (22 Mirthas)</p>
      <p class="hour">Hour: <span id="hourCount">0</span> (of 24)</p>
      <button id="soundToggle">Toggle Sound</button>
      <button id="donateButton">Donate with Stripe</button>
    </div>
  </div>
  <div id="particles-js"></div>
  <script src="clock.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: '#ffffff' },
        shape: { type: 'star' },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        move: { speed: 0.5 }
      }
    });

    document.getElementById('donateButton').addEventListener('click', async () => {
      const response = await fetch('/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: 500 }) // $5.00
      });
      const session = await response.json();
      const stripe = Stripe('pk_test_51RFpQhKPIr5mBIf3A0LICBUWQjj0zTVdKHmMp7Wq6DuzGZnv5vtzgVotX6Jvas9PTlqgdaoGjryGnml6sq2AtbFe00HoUxAN5R');
      stripe.redirectToCheckout({ sessionId: session.id });
    });
  </script>
</body>
</html>
